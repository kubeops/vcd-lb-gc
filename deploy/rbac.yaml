apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcd-lb-gc
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcd-lb-gc
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcd-lb-gc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcd-lb-gc
subjects:
  - kind: ServiceAccount
    name: vcd-lb-gc
    namespace: default
---
# Leader-election Lease (RBAC scoped to a single Lease in default).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcd-lb-gc-leader
  namespace: default
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcd-lb-gc-leader
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcd-lb-gc-leader
subjects:
  - kind: ServiceAccount
    name: vcd-lb-gc
    namespace: default
