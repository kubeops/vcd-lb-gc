apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcd-lb-gc
  namespace: default
  labels: { app: vcd-lb-gc }
spec:
  # Two replicas + leader election: one active, one hot standby.
  replicas: 2
  selector:
    matchLabels: { app: vcd-lb-gc }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 1, maxSurge: 1 }
  template:
    metadata:
      labels: { app: vcd-lb-gc }
    spec:
      serviceAccountName: vcd-lb-gc
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: vcd-lb-gc
          image: ghcr.io/arnobkumarsaha/vcd-lb-gc
          imagePullPolicy: Always
          args:
            - --cluster-id=capvcdCluster:bc77c367-851b-4bd6-b879-8832657025d8
            - --edge-gateway-id=urn:vcloud:gateway:cb64f385-38ee-4a1f-b954-866e087a5094
            - --interval=60s
            # Flip --dry-run=true while validating; remove (or set false) to enable deletions.
            - --dry-run=true
            - --v=2
          env:
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          envFrom:
            - secretRef: { name: vcd-lb-gc }
          resources:
            requests: { cpu: "20m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
