apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  namespace: vcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-b
  template:
    metadata:
      labels:
        app: app-b
    spec:
      containers:
      - name: app-b
        image: hashicorp/http-echo:latest
        args: ["-listen=:8080", "-text=app-b"]
        ports:
        - containerPort: 8080
